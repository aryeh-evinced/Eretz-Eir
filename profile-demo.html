<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ארץ עיר — עריכת פרופיל</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;500;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface-2: #222240;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.3);
            --gold: #f5c842;
            --gold-glow: rgba(245, 200, 66, 0.25);
            --teal: #0ff0b3;
            --teal-glow: rgba(15, 240, 179, 0.2);
            --purple: #a78bfa;
            --text: #eaeaea;
            --text-dim: #8888a8;
            --border: #2a2a4a;
            --input-bg: #16162b;
            --radius: 14px;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--surface-2);
            border-color: var(--text-dim);
        }

        .page-title {
            font-family: 'Rubik', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* Avatar section */
        .avatar-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .avatar-current {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            margin: 0 auto 12px;
            position: relative;
            box-shadow: 0 8px 32px var(--accent-glow);
            transition: all 0.3s;
            cursor: pointer;
        }

        .avatar-current:hover {
            transform: scale(1.05);
        }

        .avatar-edit-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .avatar-hint {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Avatar picker */
        .avatar-picker {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 24px;
            animation: slideDown 0.3s ease;
        }

        .avatar-picker.visible { display: block; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .picker-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .avatar-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            background: var(--surface-2);
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .avatar-option:hover {
            background: var(--surface);
            border-color: var(--border);
            transform: scale(1.1);
        }

        .avatar-option.selected {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* Color picker */
        .color-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-option:hover { transform: scale(1.15); }

        .color-option.selected {
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255,255,255,0.2);
        }

        /* Form fields */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            font-family: 'Heebo', sans-serif;
            font-size: 1.1rem;
            color: var(--text);
            outline: none;
            transition: all 0.3s;
            direction: rtl;
        }

        .form-input:focus {
            border-color: var(--teal);
            background: rgba(15, 240, 179, 0.03);
        }

        .form-input::placeholder {
            color: var(--text-dim);
            opacity: 0.5;
        }

        .form-hint {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* Age selector */
        .age-selector {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .age-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-family: 'Rubik', sans-serif;
        }

        .age-btn:hover {
            background: var(--surface);
            border-color: var(--text-dim);
        }

        .age-btn:active {
            transform: scale(0.95);
        }

        .age-display {
            font-family: 'Rubik', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--teal);
            min-width: 64px;
            text-align: center;
        }

        .age-label-inline {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Difficulty preference */
        .difficulty-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .difficulty-option {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .difficulty-option:hover {
            border-color: var(--text-dim);
        }

        .difficulty-option.selected {
            border-color: var(--gold);
            background: rgba(245, 200, 66, 0.06);
            box-shadow: 0 0 12px var(--gold-glow);
        }

        .difficulty-emoji {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .difficulty-label {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .difficulty-desc {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* Danger zone */
        .danger-zone {
            margin-top: 8px;
        }

        .danger-btn {
            font-family: 'Heebo', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 0;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .danger-btn:hover { opacity: 1; }

        /* Save button */
        .bottom-spacer { flex: 1; }

        .save-area {
            position: sticky;
            bottom: 0;
            padding: 16px 0;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
        }

        .btn-save {
            width: 100%;
            font-family: 'Heebo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--accent), #c23152);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 24px var(--accent-glow);
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .btn-save:active {
            transform: scale(0.98);
        }

        /* Saved toast */
        .toast {
            display: none;
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: var(--bg);
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 40px;
            z-index: 100;
            box-shadow: 0 4px 20px var(--teal-glow);
            animation: toastIn 0.4s ease;
        }

        .toast.visible { display: block; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Fade in */
        .fade-up {
            animation: fadeUp 0.4s ease both;
        }

        .fade-up:nth-child(2) { animation-delay: 0.05s; }
        .fade-up:nth-child(3) { animation-delay: 0.1s; }
        .fade-up:nth-child(4) { animation-delay: 0.15s; }
        .fade-up:nth-child(5) { animation-delay: 0.2s; }
        .fade-up:nth-child(6) { animation-delay: 0.25s; }
        .fade-up:nth-child(7) { animation-delay: 0.3s; }
        .fade-up:nth-child(8) { animation-delay: 0.35s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">✅ הפרופיל נשמר!</div>

    <div class="app">
        <!-- Top bar -->
        <div class="top-bar fade-up">
            <button class="back-btn" onclick="history.back()">→</button>
            <div class="page-title">עריכת פרופיל</div>
        </div>

        <!-- Avatar -->
        <div class="avatar-section fade-up">
            <div class="avatar-current" id="avatarCurrent" onclick="togglePicker()">
                🦁
                <div class="avatar-edit-badge">✏️</div>
            </div>
            <div class="avatar-hint">לחצו לבחירת אווטאר</div>
        </div>

        <!-- Avatar picker -->
        <div class="avatar-picker" id="avatarPicker">
            <div class="picker-title">בחרו אווטאר</div>
            <div class="avatar-grid">
                <div class="avatar-option selected" onclick="pickAvatar(this, '🦁')">🦁</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🐻')">🐻</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🦊')">🦊</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🐼')">🐼</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🦄')">🦄</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🐲')">🐲</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🦅')">🦅</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🐬')">🐬</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🦋')">🦋</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🐙')">🐙</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🦖')">🦖</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🐸')">🐸</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🚀')">🚀</div>
                <div class="avatar-option" onclick="pickAvatar(this, '⭐')">⭐</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🎸')">🎸</div>
                <div class="avatar-option" onclick="pickAvatar(this, '⚽')">⚽</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🎨')">🎨</div>
                <div class="avatar-option" onclick="pickAvatar(this, '🧩')">🧩</div>
            </div>
            <div class="picker-title">צבע רקע</div>
            <div class="color-grid">
                <div class="color-option selected" style="background: linear-gradient(135deg, #e94560, #f5c842)" onclick="pickColor(this, 'linear-gradient(135deg, #e94560, #f5c842)')"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #0ff0b3, #0a8f6a)" onclick="pickColor(this, 'linear-gradient(135deg, #0ff0b3, #0a8f6a)')"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #a78bfa, #6d28d9)" onclick="pickColor(this, 'linear-gradient(135deg, #a78bfa, #6d28d9)')"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #f5c842, #e6a817)" onclick="pickColor(this, 'linear-gradient(135deg, #f5c842, #e6a817)')"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8)" onclick="pickColor(this, 'linear-gradient(135deg, #3b82f6, #1d4ed8)')"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #ec4899, #be185d)" onclick="pickColor(this, 'linear-gradient(135deg, #ec4899, #be185d)')"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #f97316, #c2410c)" onclick="pickColor(this, 'linear-gradient(135deg, #f97316, #c2410c)')"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #14b8a6, #0f766e)" onclick="pickColor(this, 'linear-gradient(135deg, #14b8a6, #0f766e)')"></div>
            </div>
        </div>

        <!-- Name -->
        <div class="form-group fade-up">
            <label class="form-label">שם</label>
            <input class="form-input" type="text" value="להב" placeholder="איך קוראים לך?">
        </div>

        <!-- Age -->
        <div class="form-group fade-up">
            <label class="form-label">גיל</label>
            <div class="age-selector">
                <button class="age-btn" onclick="changeAge(-1)">−</button>
                <div>
                    <div class="age-display" id="ageDisplay">9</div>
                </div>
                <button class="age-btn" onclick="changeAge(1)">+</button>
                <span class="age-label-inline">הגיל עוזר לנו להתאים את רמת המשחק</span>
            </div>
        </div>

        <div class="divider fade-up"></div>

        <!-- Starting difficulty -->
        <div class="form-group fade-up">
            <label class="form-label">רמת התחלה (נגד המחשב)</label>
            <div class="difficulty-options">
                <div class="difficulty-option selected" onclick="pickDifficulty(this)">
                    <div class="difficulty-emoji">😊</div>
                    <div class="difficulty-label">קל</div>
                    <div class="difficulty-desc">המחשב נחמד</div>
                </div>
                <div class="difficulty-option" onclick="pickDifficulty(this)">
                    <div class="difficulty-emoji">🤔</div>
                    <div class="difficulty-label">רגיל</div>
                    <div class="difficulty-desc">אתגר הוגן</div>
                </div>
                <div class="difficulty-option" onclick="pickDifficulty(this)">
                    <div class="difficulty-emoji">🔥</div>
                    <div class="difficulty-label">קשה</div>
                    <div class="difficulty-desc">בלי רחמים</div>
                </div>
            </div>
            <div class="form-hint">הרמה מתכווננת אוטומטית תוך כדי משחק</div>
        </div>

        <div class="divider fade-up"></div>

        <!-- Danger zone -->
        <div class="danger-zone fade-up">
            <button class="danger-btn">🗑️ מחיקת כל הנתונים והתחלה מחדש</button>
        </div>

        <div class="bottom-spacer"></div>

        <!-- Save -->
        <div class="save-area fade-up">
            <button class="btn-save" onclick="save()">שמירה</button>
        </div>
    </div>

    <script>
        let currentAge = 9;

        function togglePicker() {
            document.getElementById('avatarPicker').classList.toggle('visible');
        }

        function pickAvatar(el, emoji) {
            document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('avatarCurrent').childNodes[0].textContent = emoji;
        }

        function pickColor(el, gradient) {
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('avatarCurrent').style.background = gradient;
        }

        function changeAge(delta) {
            currentAge = Math.max(5, Math.min(99, currentAge + delta));
            document.getElementById('ageDisplay').textContent = currentAge;
        }

        function pickDifficulty(el) {
            document.querySelectorAll('.difficulty-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        function save() {
            const toast = document.getElementById('toast');
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2000);
        }
    </script>
</body>
</html>
